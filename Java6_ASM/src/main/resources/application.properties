# SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=TheGioiDienTu;encrypt=true;trustServerCertificate=true

spring.datasource.username=sa
spring.datasource.password=123

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Ép Hibernate giữ nguyên tên cột y hệt như cấu hình trong @Column và @JoinColumn
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
jwt.secret=Java6ASMJWTSecretKeyJava6ASMJWTSecretKey123456

jwt.expiration=86400000